<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./output.css" />
  </head>

  <body>
    <section class="flex flex-col w-170 gap-4">
      <h1 class="text-3xl font-bold">Jogo de adivinhação de números</h1>
      <p class="text-sm">
        Selecionamos um número aleatório entre 1 e 100. Veja se consegue
        adivinhar em 10 tentativas ou menos. Diremos se o seu palpite foi muito
        alto ou muito baixo.
      </p>
      <div class="flex gap-2">
        <label for="palpite">Digite um palpite: </label>
        <input
          class="border outline-0"
          type="number"
          name="palpite"
          id="inputPalpite"
        />
        <button id="btnIniciar" class="bg-black text-white cursor-pointer px-4">
          Enviar palpite
        </button>
      </div>
      <div class="flex flex-col gap-3">
        <p id="palpites" class="flex gap-2"></p>
        <p id="mensagemErroAcerto" class="text-white w-full p-1"></p>
        <p id="mensagemAltoBaixo"></p>
        <button id="btnNovoJogo" class="bg-black text-white cursor-pointer px-4 active">Novo jogo</button>
      </div>
    </section>
    <script type="module" src="./modules/main.js"></script>
  </body>
</html>
