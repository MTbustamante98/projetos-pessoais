<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-[url('/assets/btc-bg.jpg')] bg-no-repeat bg-cover">
    <section class="flex justify-center items-center h-screen">
      <div
        class="grid grid-cols-1 justify-items-center bg-neutral-1 h-100 w-100 rounded-2xl border-l-4 border-r-4 border-primaria2"
      >
        <h1
          class="text-center text-4xl text-neutral-2 mt-8 font-serif font-semibold tracking-wider"
          id="tituloCard"
        ></h1>
        <div class="flex flex-col items-center h-min self-center gap-2">
          <p class="text-neutral-2 imgBitcoin" id="paragraphCard">
            Atualize o preço clicando no botão
          </p>
          <p id="data" class="text-neutral-2 ml-3"></p>
        </div>
        <button
          class="bg-primaria1 self-center cursor-pointer px-12 py-4 text-primaria4 font-bold font-sans uppercase rounded-sm hover:bg-primaria3 text-sm"
          id="btnAtualizar"
        >
          Atualizar preço
        </button>
      </div>
    </section>
    <script type="module" src="./dist/modules/script.js"></script>
  </body>
</html>
